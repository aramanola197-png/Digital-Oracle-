<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital Oracle — Modern web design and development for businesses, startups, and Web3 projects. Premium websites that turn visitors into customers." />
  <title>Digital Oracle — Modern Web Design & Digital Experiences</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Swapped out Syne for Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0A;
      --bg2: #111111;
      --bg3: #161616;
      --accent: #4F8CFF;
      --accent-dim: rgba(79,140,255,0.12);
      --white: #F5F5F5;
      --gray: #9A9A9A;
      --gray2: #5A5A5A;
      --border: rgba(255,255,255,0.07);
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.09);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; line-height: 1.1; font-weight: 800; }

    .container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }

    /* ── SECTION LABEL ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 14px;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 28px;
      height: 2px;
      background: var(--accent);
      flex-shrink: 0;
    }

    .section-title {
      font-size: clamp(30px, 5vw, 52px);
      color: var(--white);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }
    .section-sub {
      font-size: 16px;
      color: var(--gray);
      max-width: 560px;
      line-height: 1.75;
    }

    section { padding: 100px 0; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
      border: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 24px rgba(79,140,255,0.3);
    }
    .btn-primary:hover { background: #6aa0ff; transform: translateY(-1px); }
    .btn-ghost {
      background: rgba(255,255,255,0.06);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 20px 0;
      transition: background 0.4s ease, padding 0.3s ease;
      border-bottom: 1px solid transparent;
    }
    nav.scrolled {
      background: rgba(10,10,10,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-color: var(--border);
      padding: 14px 0;
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(79,140,255,0.5);
      flex-shrink: 0;
    }
    .nav-avatar-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #3a6fd8, #1a2f5e);
      border: 2px solid rgba(79,140,255,0.5);
      flex-shrink: 0;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      color: var(--gray);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-cta { display: flex; align-items: center; gap: 12px; }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    
    .menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .menu-backdrop.open { opacity: 1; pointer-events: all; }

    .mobile-menu {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 60%;
      max-width: 280px;
      background: #111111;
      border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 999;
      display: flex;
      flex-direction: column;
      padding: 80px 32px 40px;
      gap: 8px;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mobile-menu.open { transform: translateX(0); }
    .mobile-menu a {
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: color 0.2s;
    }
    .mobile-menu a:last-of-type { border-bottom: none; }
    .mobile-menu a:hover { color: var(--accent); }
    .mobile-close {
      position: absolute;
      top: 20px; right: 20px;
      width: 36px; height: 36px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      transition: background 0.2s;
    }
    .mobile-close:hover { background: rgba(255,255,255,0.12); }

    /* ── HERO ── */
    #home {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 140px 0 100px;
    }
    canvas#particles {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.45;
    }
    .hero-glow {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,140,255,0.11) 0%, transparent 70%);
      top: -180px; right: -120px;
      pointer-events: none;
      animation: pulse-glow 6s ease-in-out infinite;
    }
    .hero-glow-2 {
      position: absolute;
      width: 360px; height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,140,255,0.06) 0%, transparent 70%);
      bottom: 0; left: -80px;
      pointer-events: none;
      animation: pulse-glow 8s ease-in-out infinite reverse;
    }
    @keyframes pulse-glow {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(1.08); }
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid rgba(79,140,255,0.25);
      border-radius: 100px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin-bottom: 28px;
      background: var(--accent-dim);
    }
    .hero-tag::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .hero-title {
      font-size: clamp(38px, 5.5vw, 68px);
      line-height: 1.06;
      margin-bottom: 24px;
      letter-spacing: -0.025em;
    }
    .hero-title .accent-word {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 6px;
      text-decoration-thickness: 2px;
    }
    .hero-sub {
      font-size: 16px;
      color: var(--gray);
      line-height: 1.75;
      margin-bottom: 40px;
      max-width: 500px;
    }
    .hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }
    .hero-visual { display: flex; align-items: center; justify-content: center; }
    .founder-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      max-width: 290px;
      width: 100%;
      position: relative;
      box-shadow: 0 0 60px rgba(79,140,255,0.07);
    }
    .card-badge {
      position: absolute;
      top: -12px; right: 20px;
      background: rgba(30,60,30,0.9);
      border: 1px solid rgba(80,200,80,0.3);
      color: #6ddc6d;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 4px 12px;
      border-radius: 100px;
      text-transform: uppercase;
    }
    .founder-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }
    .founder-role { font-size: 12px; color: var(--gray); margin-bottom: 20px; }
    .founder-divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 20px; }
    .founder-stat {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 4px;
    }
    .founder-stat-label { font-size: 12px; color: var(--gray); }
    .scroll-hint {
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--gray2);
      font-size: 10px;
      letter-spacing: 0.14em;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
    }
    .scroll-line {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scroll-bounce 2s ease-in-out infinite;
    }
    @keyframes scroll-bounce { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── ABOUT ── */
    #about { background: var(--bg); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .about-pfp-wrap { position: relative; }
    .about-pfp-card { background: var(--bg2); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; }
    .about-pfp-placeholder {
      width: 100%;
      aspect-ratio: 1/1;
      background: #b5e8c0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 80px;
      color: rgba(0,0,0,0.15);
    }
    .about-pfp-footer { padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; background: var(--bg2); }
    .about-pfp-name { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; color: var(--white); }
    .about-pfp-title { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .about-availability {
      background: rgba(79,140,255,0.15);
      border: 1px solid rgba(79,140,255,0.3);
      border-radius: 100px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      white-space: nowrap;
    }
    .about-content p { color: var(--gray); font-size: 16px; line-height: 1.8; margin-bottom: 20px; }
    .about-values { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 32px; }
    .value-pill {
      padding: 7px 16px;
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      font-size: 13px;
      color: var(--gray);
      background: var(--glass);
      transition: all 0.2s;
    }
    .value-pill:hover { border-color: var(--accent); color: var(--accent); }

    /* ── SERVICES ── */
    #services { background: var(--bg2); }
    .services-header { margin-bottom: 56px; }
    .services-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .service-card {
      background: var(--bg3);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 32px 28px;
      position: relative;
      transition: border-color 0.3s, transform 0.3s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .service-card:hover { border-color: rgba(79,140,255,0.22); transform: translateY(-3px); }
    .service-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(79,140,255,0.15);
      border: 1px solid rgba(79,140,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
    }
    .service-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .service-title { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; color: var(--white); }
    .service-desc { font-size: 14px; color: var(--gray); line-height: 1.7; }
    .service-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gray); text-decoration: none; margin-top: 8px; transition: color 0.2s; }
    .service-link:hover { color: var(--accent); }
    .service-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── PORTFOLIO ── */
    #portfolio { background: var(--bg); }
    .portfolio-header { margin-bottom: 48px; }
    .portfolio-grid { display: flex; flex-direction: column; gap: 24px; }
    .project-card { background: var(--bg2); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; transition: border-color 0.3s; }
    .project-card:hover { border-color: rgba(79,140,255,0.2); }
    .project-visual { position: relative; overflow: hidden; background: #0d1421; min-height: 220px; display: flex; align-items: center; justify-content: center; }
    .project-visual img { width: 80%; max-width: 420px; display: block; object-fit: contain; padding: 24px 0; }
    
    .laptop-mockup { width: 76%; max-width: 400px; padding: 24px 0; }
    .laptop-screen { background: var(--bg3); border-radius: 8px 8px 0 0; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
    .laptop-bar { height: 20px; background: #1a1a1a; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 5px; padding: 0 10px; }
    .laptop-dot { width: 6px; height: 6px; border-radius: 50%; }
    .laptop-content { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .laptop-hero { height: 48px; border-radius: 4px; }
    .laptop-line { height: 8px; border-radius: 3px; background: rgba(255,255,255,0.06); }
    .laptop-btn { height: 22px; width: 35%; border-radius: 4px; margin-top: 4px; }
    .laptop-base { width: 60%; height: 14px; background: #222; margin: 0 auto; border-radius: 0 0 6px 6px; }
    .laptop-foot { width: 80%; height: 5px; background: #1a1a1a; margin: 0 auto; border-radius: 0 0 4px 4px; }
    
    .project-info { padding: 28px 28px 32px; }
    .project-tag { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray2); margin-bottom: 10px; }
    .project-title { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 800; color: var(--white); margin-bottom: 10px; letter-spacing: -0.01em; }
    .project-desc { font-size: 14px; color: var(--gray); line-height: 1.7; margin-bottom: 20px; }
    .project-detail-label { font-size: 11px; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase; color: var(--gray2); margin-bottom: 5px; margin-top: 16px; }
    .project-detail-text { font-size: 14px; color: var(--white); line-height: 1.65; }
    .project-btn {
      display: inline-flex; align-items: center; gap: 7px; margin-top: 24px; padding: 12px 22px; border-radius: 100px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: var(--white); font-size: 13px; font-weight: 600; text-decoration: none; transition: all 0.2s;
    }
    .project-btn:hover { border-color: var(--accent); color: var(--accent); }
    .project-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── PROCESS ── */
    #process { background: var(--bg2); }
    .process-header { margin-bottom: 56px; }
    .process-steps { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .process-step { background: var(--bg3); border: 1px solid var(--glass-border); border-radius: 18px; padding: 36px 32px; transition: border-color 0.3s; }
    .process-step:hover { border-color: rgba(79,140,255,0.2); }
    .step-num { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--accent); margin-bottom: 16px; }
    .step-title { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; color: var(--white); margin-bottom: 12px; }
    .step-desc { font-size: 14px; color: var(--gray); line-height: 1.7; }

    /* ── STATS ── */
    #stats { background: var(--bg); padding: 72px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
    .stat-item { background: var(--bg); padding: 48px 32px; text-align: center; }
    .stat-num { font-family: 'Montserrat', sans-serif; font-size: clamp(44px, 6vw, 68px); font-weight: 800; color: var(--white); line-height: 1; margin-bottom: 10px; display: flex; align-items: baseline; justify-content: center; gap: 2px; }
    .stat-suffix { color: var(--accent); font-size: 0.65em; }
    .stat-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray); }

<!-- SOCIAL -->
<section id="social">
  <div class="container">
    <div class="social-header">
      <span class="section-label reveal">Social</span>
      <h2 class="section-title reveal reveal-delay-1">Connect With Me</h2>
    </div>
    <div class="social-grid reveal reveal-delay-2">

<script>
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 40);
  });

  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  const mobileClose = document.getElementById('mobileClose');
  const menuBackdrop = document.getElementById('menuBackdrop');

  function openMenu() {
    mobileMenu.classList.add('open');
    menuBackdrop.classList.add('open');
    hamburger.classList.add('open');
  }
  function closeMenu() {
    mobileMenu.classList.remove('open');
    menuBackdrop.classList.remove('open');
    hamburger.classList.remove('open');
  }

  hamburger.addEventListener('click', openMenu);
  mobileClose.addEventListener('click', closeMenu);
  menuBackdrop.addEventListener('click', closeMenu);
  document.querySelectorAll('.mobile-link').forEach(l => l.addEventListener('click', closeMenu));

  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -36px 0px' });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  function animateCounter(el) {
    const target = parseInt(el.dataset.target);
    const duration = 1800;
    const start = performance.now();
    function update(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.floor(ease * target);
      if (progress < 1) requestAnimationFrame(update);
      else el.textContent = target;
    }
    requestAnimationFrame(update);
  }
  const counterObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { animateCounter(entry.target); counterObserver.unobserve(entry.target); }
    });
  }, { threshold: 0.5 });
  document.querySelectorAll('.counter').forEach(el => counterObserver.observe(el));

  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let w, h;
  function resize() { w = canvas.width = canvas.offsetWidth; h = canvas.height = canvas.offsetHeight; }
  resize();
  window.addEventListener('resize', resize);
  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * w; this.y = Math.random() * h;
      this.size = Math.random() * 1.1 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.28; this.speedY = (Math.random() - 0.5) * 0.28;
      this.alpha = Math.random() * 0.35 + 0.08;
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
    }
    draw() {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(79,140,255,${this.alpha})`; ctx.fill();
    }
  }
  for (let i = 0; i < 70; i++) particles.push(new Particle());
  function drawLines() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 95) {
          ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(79,140,255,${0.055 * (1 - dist / 95)})`; ctx.lineWidth = 0.5; ctx.stroke();
        }
      }
    }
  }
  function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    drawLines();
    requestAnimationFrame(animate);
  }
  animate();

  function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('formMsg');
    btn.textContent = 'Sending...'; btn.disabled = true;
    setTimeout(() => {
      btn.textContent = 'Message Sent';
      msg.style.display = 'block';
      msg.textContent = 'Thank you — I will be in touch shortly.';
      document.getElementById('contactForm').reset();
      setTimeout(() => { btn.textContent = 'Send Message'; btn.disabled = false; msg.style.display = 'none'; }, 4000);
    }, 1200);
  }
</script>
